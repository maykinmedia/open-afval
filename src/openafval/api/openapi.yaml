openapi: 3.0.3
info:
  title: Open Afval
  version: 0.0.1
paths:
  /api/v1/afval-profiel/{bsn}/:
    get:
      operationId: afvalProfielRetrieve
      description: Returns the complete afval profiel for a specific klant. This is
        a detail view returning a single profiel object with all containers, all container
        locations, and ledigingen.
      summary: Retrieve afval profiel for a klant by BSN
      parameters:
      - in: query
        name: adres
        schema:
          type: string
        description: Filter container locations by address (repeatable for multiple)
      - in: query
        name: afval-type
        schema:
          type: string
          enum:
          - gft
          - restafval
        description: Filter containers by waste type
      - in: path
        name: bsn
        schema:
          type: string
          pattern: ^[0-9]{8,9}$
        required: true
      - in: query
        name: einddatum
        schema:
          type: string
        description: Filter ledigingen until this date (YYYY-MM-DD)
      - in: query
        name: startdatum
        schema:
          type: string
        description: Filter ledigingen from this date (YYYY-MM-DD)
      tags:
      - Afval profiel
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AfvalProfiel'
          description: ''
        '404':
          description: No response body
components:
  schemas:
    AfvalProfiel:
      type: object
      properties:
        klant:
          $ref: '#/components/schemas/Klant'
        containers:
          type: array
          items:
            $ref: '#/components/schemas/Container'
        containerLocaties:
          type: array
          items:
            $ref: '#/components/schemas/ContainerLocation'
        ledigingen:
          type: array
          items:
            $ref: '#/components/schemas/Lediging'
      required:
      - containerLocaties
      - containers
      - klant
      - ledigingen
    Container:
      type: object
      properties:
        id:
          type: string
          format: uuid
        publicContainerId:
          type: string
        afvalType:
          type: string
        isVerzamelcontainer:
          type: boolean
        heeftSleutel:
          type: boolean
        totaalGewicht:
          type: number
          format: double
        totaalKosten:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
      required:
      - afvalType
      - heeftSleutel
      - id
      - isVerzamelcontainer
      - publicContainerId
      - totaalGewicht
      - totaalKosten
    ContainerLocation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        adres:
          type: string
        totaalGewicht:
          type: number
          format: double
        totaalKosten:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
      required:
      - adres
      - id
      - totaalGewicht
      - totaalKosten
    Klant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bsn:
          type: string
        naam:
          type: string
        totaalKosten:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
      required:
      - bsn
      - id
      - naam
      - totaalKosten
    Lediging:
      type: object
      properties:
        id:
          type: string
          format: uuid
        containerLocation:
          type: string
          format: uuid
        klant:
          type: string
          format: uuid
        container:
          type: string
          format: uuid
        gewicht:
          type: number
          format: double
        geleegdOp:
          type: string
          format: date-time
        kosten:
          type: number
          format: double
          maximum: 100000000
          minimum: -100000000
          exclusiveMaximum: true
          exclusiveMinimum: true
      required:
      - container
      - containerLocation
      - geleegdOp
      - gewicht
      - id
      - klant
      - kosten
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
